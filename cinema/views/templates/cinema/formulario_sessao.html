{% extends "layout.html" %}
{% block title %}{{ 'Editar sessão' if sessao else 'Nova sessão' }}{% endblock %}

{% block content %}
<h1>{{ 'Editar sessão' if sessao else 'Nova sessão' }}</h1>

<form method="POST" action="{{ url_for('cinema.editar_sessao', sessao_id=sessao.id) if sessao else url_for('cinema.cadastrar_sessao') }}">
    <div class="form-grupo">
        <label>Filme</label>
        <select name="filme_id" required>
            <option value="">Selecione o filme...</option>
            {% for filme in filmes %}
            <option value="{{ filme.id }}" {% if sessao and filme.id == sessao.filme_id %}selected{% endif %}>
                {{ filme.titulo }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="form-grupo">
        <label>Sala</label>
        <select name="sala_id" required>
            <option value="">Selecione a sala...</option>
            {% for sala in salas %}
            <option value="{{ sala.id }}" {% if sessao and sala.id == sessao.sala_id %}selected{% endif %}>
                {{ sala.numero }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="form-grupo">
        <label>Data e hora</label>
        <input type="datetime-local" name="data_hora" value="{{ sessao.data_hora|datetime_local }}" required>
    </div>
    <div class="form-grupo">
        <label>Preço do ingresso (R$)</label>
        <input type="number" name="preco" step="any" min="0" value="{{ sessao.preco }}" required>
    </div>
    <button type="submit">Salvar</button>
</form>

<p><a href="{{ url_for('cinema.index') }}">← Voltar</a></p>
{% endblock %}
